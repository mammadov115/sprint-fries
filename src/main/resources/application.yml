server:
  # T…ôtbiqimizin iŇül…ôy…ôc…ôyi portu t…ôyin edir.
  # Django-da standart olaraq 'python manage.py runserver' ed…ônd…ô layih…ô 8000 portunda qalxńĪr.
  # Spring Boot-da is…ô daxili Tomcat serveri defolt olaraq 8080 portunu istifad…ô edir. 
  # ńįst…ôs…ôn bunu 8000 v…ô ya baŇüqa portla …ôv…ôz ed…ô bil…ôrs…ôn.
  port: 8080

spring:
  application:
    # Layih…ônin qlobal adńĪnńĪ (ID-sini) t…ôyin edir.
    # Django-da birbaŇüa layih…ô qovluńüunun adńĪ (m…ôs…ôl…ôn, 'taskfries') n…ôdirs…ô, sistem onu …ôsas g√∂t√ľr√ľr.
    # Spring d√ľnyasńĪnda is…ô bu ad g…ôl…ôc…ôkd…ô loqlarda, mikroxidm…ôtl…ôr arasńĪ …ôlaq…ôd…ô 
    # v…ô ya cloud konfiqurasiyalarńĪnda bu t…ôtbiqi tanńĪmaq √ľ√ß√ľn istifad…ô olunacaq m…ôrk…ôzi addńĪr.
    name: SprintFries

  # Veril…ônl…ôr bazasńĪ konfiqurasiyasńĪ (Django settings.py daxilind…ôki DATABASES dict-i il…ô eynidir)
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:sprintfries_main}  # jdbc:postgresql:// -> Django-dakńĪ ENGINE kimidir
    username: ${DB_USER:sprintfries_user}
    password: ${DB_PASSWORD:sprintfries_password}
    driver-class-name: org.postgresql.Driver

  # JPA v…ô Hibernate t…ônziml…ôm…ôl…ôri
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # ddl-auto: Django-dakńĪ makemigrations/migrate m…ôntiqini idar…ô edir. 
      # 'update' -> Modell…ôrd…ô d…ôyiŇüiklik olanda c…ôdv…ôll…ôri avtomatik yenil…ôyir.
      ddl-auto: update
    show-sql: true  # Arxa planda d√∂n…ôn SQL sorńüularńĪnńĪ terminalda g√∂rm…ôk √ľ√ß√ľn (Django-dakńĪ connection.queries kimi)
    properties:
      hibernate:
        format_sql: true # SQL kodlarńĪnńĪ terminalda daha oxunqlu formatda √ßńĪxarńĪr