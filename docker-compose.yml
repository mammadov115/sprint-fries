version: '3.8'

services:
  # Bizim m…ôrk…ôzi PostgreSQL veril…ônl…ôr bazasńĪ xidm…ôtimiz
  postgres_db:
    image: postgres:16-alpine
    container_name: sprintfries_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}  # Bizim m…ôrk…ôzi (public) veril…ônl…ôr bazamńĪz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Bazaya vizual baxa bilm…ôk √ľ√ß√ľn PgAdmin (Django-dakńĪ daxili Admin paneli kimi bir rahatlńĪq)
  pgadmin:
    image: dpage/pgadmin4
    container_name: sprintfries_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"  # Brauzerd…ô http://localhost:5050 yazaraq daxil olacańüńĪq
    depends_on:
      - postgres_db

volumes:
  postgres_data: